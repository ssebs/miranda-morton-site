server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro uses directory-style URLs (/about/), so requests to /about get a
    # 301 to add the trailing slash. Keep that redirect relative so nginx does
    # not rewrite the host/port (which otherwise drops e.g. :8080).
    absolute_redirect off;

    # Astro builds static .html files; serve clean URLs and fall back to 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
